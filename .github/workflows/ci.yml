name: CI

on:
  push:
    branches:
      - main
      - hardening/**
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for merge conflict markers
        run: |
          if grep -RIn "<<<<<<<\|=======\|>>>>>>>" -- . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist; then
            echo "Merge conflict markers found. Resolve them before building."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
