name: CI

# Fast gate: conflict markers only. Full validation runs in release-check.yml on main.
on:
  push:
    branches:
      - main
      - hardening/**
  pull_request:
    branches:
      - main

jobs:
  conflict-markers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for merge conflict markers
        run: |
          if grep -RIn "<<<<<<<\|=======\|>>>>>>>" -- . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=dist; then
            echo "Merge conflict markers found. Resolve them before building."
            exit 1
          fi
