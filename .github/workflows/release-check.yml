name: Release Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release check
        env:
          APP_SETTINGS_SECRET: ci-release-check-settings-secret-min-32-characters-long
        run: npm run release:check
