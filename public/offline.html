<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1e3a5f">
  <title>FRIGEST - Sin conexión</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      background-color: #f8f9fb;
      color: #0f172a;
    }
    
    .offline-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }
    
    .offline-icon {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      background-color: #1e3a5f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      margin: 0 0 12px 0;
    }
    
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #64748b;
      margin: 0 0 24px 0;
      max-width: 400px;
    }
    
    button {
      background-color: #f97316;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #ea580c;
    }
    
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
      
      p {
        color: #94a3b8;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">F</div>
    <h1>No hay conexión a internet</h1>
    <p>No se puede conectar a FRIGEST. Por favor, verifica tu conexión a internet e inténtalo de nuevo.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
  
  <script>
    // Verificar conexión periódicamente
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 5000);
    
    // Escuchar cuando la conexión se restablezca
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
