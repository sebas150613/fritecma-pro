# Ejemplo Nginx — FRIGEST (NO copiar literalmente sin revisar rutas y certificados)
#
# Supuestos:
#   - Certificados TLS gestionados con Certbot (Let's Encrypt); rutas típicas:
#       ssl_certificate /etc/letsencrypt/live/frigest.es/fullchain.pem;
#       ssl_certificate_key /etc/letsencrypt/live/frigest.es/privkey.pem;
#   - Node escucha en 127.0.0.1:3000 (APP_SERVER_HOST=127.0.0.1 APP_SERVER_PORT=3000).
#   - Carpeta "apex" solo landing + legal (sin SPA completa). Opción A: copiar tras build
#       cp -r /var/www/frigest/current/dist/legal /var/www/frigest/static-frigest-es/legal
#     y añadir un index.html de landing en /var/www/frigest/static-frigest-es/
#   - SPA completa del build Vite en /var/www/frigest/current/dist para app.frigest.es
#
# Activar HTTPS tras: sudo certbot certonly --nginx -d frigest.es -d www.frigest.es -d app.frigest.es -d api.frigest.es
# (o certbot --nginx según flujo preferido).

# Redirección www → apex (HTTP inicial; Certbot suele añadir bloques SSL)
server {
    listen 80;
    listen [::]:80;
    server_name www.frigest.es;
    return 301 https://frigest.es$request_uri;
}

# Apex: contenido estático (landing + /legal/*.html)
server {
    listen 80;
    listen [::]:80;
    server_name frigest.es;

    root /var/www/frigest/static-frigest-es;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /legal/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    # Tras obtener certificados, descomentar y pasar a 443 o dejar que Certbot reescriba:
    # listen 443 ssl http2;
    # ssl_certificate ...;
    # ssl_certificate_key ...;
}

# SPA: aplicación React (Vite dist/)
server {
    listen 80;
    listen [::]:80;
    server_name app.frigest.es;

    root /var/www/frigest/current/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # listen 443 ssl http2; ... (Certbot)
}

# API: proxy a Node
server {
    listen 80;
    listen [::]:80;
    server_name api.frigest.es;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Archivos subidos expuestos por Express en /uploads (si el mismo host sirve uploads)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # listen 443 ssl http2; ... (Certbot)
}

# --- Notas ---
# 1) Tras certbot --nginx, los bloques suelen fusionarse en archivos en sites-enabled.
# 2) APP_TRUST_PROXY=1 en Node porque X-Forwarded-* los envía Nginx.
# 3) APP_ALLOWED_ORIGINS debe incluir https://app.frigest.es y los orígenes del apex si el SPA llama desde ahí.
# 4) Webhooks Stripe: POST /api/billing/webhook debe alcanzar este mismo upstream (raw body lo gestiona Express).
